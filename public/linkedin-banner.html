<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkedIn Banner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .banner {
    width: 1584px;
    height: 396px;
    background: #0a0a0f;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(232, 101, 10, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232, 101, 10, 0.025) 1px, transparent 1px);
    background-size: 44px 44px;
  }

  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.06) 2px,
      rgba(0, 0, 0, 0.06) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .glow {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232, 101, 10, 0.06) 0%, transparent 70%);
    top: 50%;
    left: 55%;
    transform: translate(-50%, -50%);
  }

  .glow2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232, 101, 10, 0.03) 0%, transparent 70%);
    top: 40%;
    left: 30%;
    transform: translate(-50%, -50%);
  }

  .content {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 48px;
    margin-left: 420px;
  }

  .logo-wrap {
    flex-shrink: 0;
  }

  .logo-wrap img {
    height: 220px;
    width: auto;
    filter: drop-shadow(0 0 24px rgba(124, 58, 237, 0.15));
  }

  .divider {
    width: 1px;
    height: 160px;
    background: linear-gradient(to bottom, transparent, rgba(232, 101, 10, 0.3), transparent);
    flex-shrink: 0;
  }

  .text-block {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .tagline {
    font-family: 'DM Sans', sans-serif;
    font-size: 42px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.3;
    max-width: 750px;
    letter-spacing: -0.01em;
  }

  .tagline .accent {
    color: #E8650A;
  }

  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    letter-spacing: 0.08em;
    color: rgba(232, 101, 10, 0.5);
  }

  .dots {
    position: absolute;
    bottom: 24px;
    right: 32px;
    display: flex;
    gap: 6px;
    z-index: 5;
  }

  .dot-deco {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(232, 101, 10, 0.2);
  }

  .h-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent 0%, rgba(232, 101, 10, 0.15) 30%, rgba(232, 101, 10, 0.3) 50%, rgba(232, 101, 10, 0.15) 70%, transparent 100%);
    z-index: 5;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="grid-bg"></div>
    <div class="glow"></div>
    <div class="glow2"></div>

    <div class="content">
      <div class="logo-wrap">
        <img src="laterna-logo-navbar.svg" alt="Laterna">
      </div>
      <div class="divider"></div>
      <div class="text-block">
        <div class="tagline">
          Building the most comprehensive<br>
          <span class="accent">plasma physics</span> learning platform.
        </div>
        <div class="url">laterna.space</div>
      </div>
    </div>

    <div class="dots">
      <div class="dot-deco"></div>
      <div class="dot-deco"></div>
      <div class="dot-deco"></div>
    </div>
    <div class="h-line"></div>
  </div>
</body>
</html>
